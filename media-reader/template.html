<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="X-UA-Compatible"
      content="IE=edge"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>媒体查看器</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/element-plus/dist/index.css"
    />
    <script src="https://unpkg.com/vue@3"></script>
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <style>
      /* var */
      :root {
        --color-gary-0: #fff;
        --color-gary-1: #f7f7f7;
        --color-gary-2: #e3e5e7;
        --color-gary-3: #c9ccd0;

        --color-gary-9: #2f3238;
        --color-gary-10: #18191c;
        --color-gray-99: #000;
      }

      body[theme='theme-dark'] {
        --bg-color: var(--color-gary-9);
        --aside-color: var(--color-gary-10);
        --font-color: var(--color-gary-1);
        --hover-color: var(--color-gary-99);
      }

      body[theme='theme-light'] {
        --bg-color: var(--color-gary-1);
        --aside-color: var(--color-gary-2);
        --font-color: var(--color-gary-99);
        --hover-color: var(--color-gary-3);
      }

      /* 样式 */
      body {
        margin: 0;
        color: var(--font-color);
      }

      #app {
        background-color: var(--bg-color);
      }

      .container {
        & > * {
          padding: 12px;
          height: 100vh;
        }
      }

      .menus {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        .menus1 {
          padding: 8px;
          background-color: var(--aside-color);
          border-radius: 8px;
          height: 46%;
        }
        .menus2 {
          padding: 8px;
          border-radius: 8px;
          background-color: var(--aside-color);
          height: 46%;
        }
        h2 {
          font-size: 16px;
          margin: 0;
          margin-bottom: 4px;
        }
      }
      .main-content {
        .media-box {
          display: flex;
          flex-direction: column;
          align-items: center;
        }
      }

      .setting {
        background-color: var(--aside-color);
      }

      .el-tree {
        background-color: transparent;
        color: var(--font-color);
      }
      .el-tree-node__content:hover {
        background-color: var(--hover-color);
      }

      /* reset */
      ::-webkit-scrollbar {
        width: 0px; /* 滚动条宽度 */
        height: 0px; /* 滚动条高度 */
      }
    </style>
  </head>

  <body theme="theme-dark">
    <div id="app">
      <el-container class="container">
        <el-aside
          class="menus"
          style="width: 300px"
        >
          <div class="menus1">
            <h2>
              <el-icon
                style="top: 2px; margin-right: 4px"
                @click="onChooseFloder(node)"
              >
                <folder /> </el-icon
              >文件夹目录</h2
            >
            <el-tree
              :data="menuTree"
              style="height: calc(100% - 24px); overflow-y: scroll"
            >
              <template #default="{ node, data }">
                <el-tooltip
                  class="box-item"
                  effect="dark"
                  :content="node.label"
                  placement="right-start"
                >
                  <span @click="onChooseFloder(node)">{{ node.label }}</span>
                </el-tooltip>
              </template>
            </el-tree>
          </div>

          <div class="menus2">
            <h2
              ><el-icon style="top: 2px; margin-right: 4px"><memo /></el-icon
              >文件目录</h2
            >
            <el-col style="height: calc(100% - 24px); overflow-y: scroll">
              <el-row
                @click="()=>scrolltoTop(`content-${idx}`)"
                v-for="file,idx in currentFloder.files"
                :key="idx"
              >
                {{file.label.replace(/.+\//g, "")}}
              </el-row>
            </el-col>
          </div>
        </el-aside>

        <!-- content -->
        <el-main class="main-content">
          <div
            :id="`content-${idx}`"
            class="media-box"
            v-for="(child, idx) in currentFloder.files"
            :key="idx"
          >
            <el-image
              v-if="child.fileType === 'image'"
              :src="child.label"
            />

            <video
              v-if="child.fileType === 'video'"
              id="my-video"
              class="video-js"
              controls
              preload="auto"
              width="640"
              height="264"
              poster="MY_VIDEO_POSTER.jpg"
              data-setup="{}"
            >
              <source
                :src="child.label"
                type="video/mp4"
              />
              <p class="vjs-no-js">
                To view this video please enable JavaScript, and consider
                upgrading to a web browser that
                <a
                  href="https://videojs.com/html5-video-support/"
                  target="_blank"
                  >supports HTML5 video</a
                >
              </p>
            </video>
          </div>
        </el-main>

        <el-aside
          class="setting"
          style="width: 180px"
        >
        </el-aside>
      </el-container>
    </div>

    <script>
      const { createApp, ref, onMounted, computed, watch } = Vue
      const { Folder, Memo } = ElementPlusIconsVue

      const menus = `{{ template }}`

      createApp({
        setup() {
          function createNode(label, type) {
            return {
              label,
              type,
              fileType: '',
              children: [],
              files: [],
              parent: null,
            }
          }
          function dfs(node) {
            // 处理当前节点
            const res = createNode(node.name, 'folder')
            // 处理 children
            for (let i = 0; i < node.children.length; i++) {
              const element = node.children[i]
              const child = dfs(element)
              child.parent = res // 设置父节点
              res.children.push(child)
            }
            // 处理 files
            for (let i = 0; i < node.files.length; i++) {
              const element = node.files[i]
              const child = createNode(element, 'file')
              child.parent = res // 设置父节点F
              child.fileType = getFileType(child)
              res.files.push(child)
            }
            return res
          }

          function getFileType(child) {
            const postfix = child.label.replace(/.+\./, '')
            if (['jpg', 'jpeg', 'png', 'webp'].includes(postfix)) {
              return 'image'
            }
            if (['mp4', 'webm'].includes(postfix)) {
              return 'video'
            }
            return 'unknow'
          }

          const menuTree = ref([dfs(JSON.parse(menus))])

          const currentFloder = ref({})
          function onChooseFloder(node) {
            currentFloder.value = node.data
            scrolltoTop(`content-0`)
          }

          function scrolltoTop(id) {
            const el = document.getElementById(id)
            el.scrollIntoView({
              behavior: 'smooth', // 平滑滚动
              block: 'start', // 对齐到容器的顶部
            })
          }

          return {
            scrolltoTop,
            menuTree,
            currentFloder,
            onChooseFloder,
          }
        },
      })
        .use(ElementPlus)
        .component('Folder', Folder)
        .component('Memo', Memo)
        .mount('#app')
    </script>
  </body>
</html>
