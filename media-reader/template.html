<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>媒体查看器</title>
    <!-- 引入Element Plus CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/element-plus/dist/index.css"
    />
    <!-- 引入Vue 3 -->
    <script src="https://unpkg.com/vue@3"></script>
    <!-- 引入Element Plus JS -->
    <script src="https://unpkg.com/element-plus"></script>
    <!-- 引入Element Plus图标库 -->
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <style>
      :root {
        --color-black-10: #222222;
        --color-white-10: #f7f7f7;
      }

      :root(theme="theme-dark") {
        --bg-color: var(--color-black-10);
      }

      :root(theme="theme-light") {
        --bg-color: var(--color-white-10);
      }

      #app {
        background-color: var(--bg-color);
      }
    </style>
  </head>

  <body theme="theme-dark">
    <div id="app">
      <el-container>
        <el-aside>
          <!--  上传文件 -->
          <el-upload
            class="upload-demo"
            drag
            multiple
            :before-upload="beforeUpload"
            v-model="file"
          >
            <el-icon class="el-icon--upload"><upload-filled /></el-icon>
            <div class="el-upload__text">
              Drop file here or <em>click to upload</em>
            </div>
            <template #tip>
              <div class="el-upload__tip">
                jpg/png files with a size less than 500kb
              </div>
            </template>
          </el-upload>

          <el-tree
            style="max-width: 600px"
            :data="data"
            :props="defaultProps"
            @node-click="handleNodeClick"
          />
        </el-aside>
        <el-main>Main</el-main>
        <el-image
          style="width: 100px; height: 100px"
          src="./root-test/images (1).jpeg"
          :fit="fit"
        />
      </el-container>
    </div>

    <script>
      const { createApp, ref, onMounted, computed } = Vue;

      const menus = `{{ template }}`;

      const {
        ElTree,
        ElEmpty,
        ElDialog,
        ElUpload,
        ElContainer,
        ElAside,
        ElMain
      } = ElementPlus;
      const { UploadFilled } = ElementPlusIconsVue;

      createApp({
        components: {
          ElTree,
          ElEmpty,
          ElDialog,
          ElUpload,
          ElContainer,
          ElAside,
          ElMain,
          UploadFilled
        },
        setup() {
          const file = ref(null);
          const treeRef = ref(null);
          const dialogVisible = ref(false);
          const currentMedia = ref(null);
          const currentFolderId = ref("root");

          // 模拟文件树结构
          // 在实际应用中，这里应该通过后端API获取真实的目录结构
          const fileTree = ref([
            {
              id: "root",
              name: "root-test",
              path: "./root-test",
              isDir: true,
              children: [
                {
                  id: "file1",
                  name: "images (1).jpeg",
                  path: "./root-test/images (1).jpeg",
                  isDir: false
                },
                {
                  id: "file2",
                  name: "images.jpeg",
                  path: "./root-test/images.jpeg",
                  isDir: false
                },
                {
                  id: "subfolder1",
                  name: "子文件夹1",
                  path: "./root-test/subfolder1",
                  isDir: true,
                  children: [
                    {
                      id: "subfile1",
                      name: "subimage1.jpg",
                      path: "./root-test/subfolder1/subimage1.jpg",
                      isDir: false
                    }
                  ]
                }
              ]
            }
          ]);

          // 树状图配置
          const treeProps = {
            children: "children",
            label: (data) => {
              if (data.isDir) {
                return `<span class="folder-icon"><i class="el-icon-folder"></i> ${data.name}</span>`;
              } else if (isImage(data.name)) {
                return `<span class="image-icon"><i class="el-icon-picture"></i> ${data.name}</span>`;
              } else {
                return `<span class="video-icon"><i class="el-icon-video-camera"></i> ${data.name}</span>`;
              }
            },
            isLeaf: (data) => !data.isDir
          };

          // 获取当前路径
          const currentPath = computed(() => {
            // 在实际应用中，这里应该根据 currentFolderId 构建完整路径
            if (currentFolderId.value === "root") {
              return "/root-test";
            } else if (currentFolderId.value === "subfolder1") {
              return "/root-test/子文件夹1";
            }
            return "/root-test";
          });

          // 获取当前文件夹中的文件
          const currentFiles = computed(() => {
            // 递归查找当前文件夹
            const findFolder = (nodes, id) => {
              for (const node of nodes) {
                if (node.id === id) {
                  return node;
                }
                if (node.children) {
                  const found = findFolder(node.children, id);
                  if (found) return found;
                }
              }
              return null;
            };

            const folder = findFolder(fileTree.value, currentFolderId.value);
            if (folder && folder.children) {
              // 返回非目录文件
              return folder.children.filter((item) => !item.isDir);
            }
            return [];
          });

          // 处理节点点击
          const handleNodeClick = (data) => {
            if (data.isDir) {
              // 点击的是文件夹，切换当前文件夹
              currentFolderId.value = data.id;
            } else {
              // 点击的是文件，查看媒体
              viewMedia(data);
            }
          };

          // 查看媒体
          const viewMedia = (file) => {
            currentMedia.value = file;
            dialogVisible.value = true;
          };

          // 判断是否为图片
          const isImage = (fileName) => {
            const imageExtensions = ["jpg", "jpeg", "png", "gif", "bmp", "svg"];
            const extension = fileName.split(".").pop().toLowerCase();
            return imageExtensions.includes(extension);
          };

          // 获取文件类型
          const getFileType = (fileName) => {
            const extension = fileName.split(".").pop().toUpperCase();
            return `${extension} 文件`;
          };

          const beforeUpload = (files) => {
            console.log(files);
            // 如何读取文件夹中的内容

            return;

            const isJpgOrPng =
              file.type === "image/jpeg" || file.type === "image/png";
            if (!isJpgOrPng) {
              ElMessage.error("上传图片只能是 JPG/PNG 格式!");
            }
            return isJpgOrPng;
          };
          return {
            file,
            beforeUpload,
            treeRef,
            fileTree,
            treeProps,
            currentFiles,
            currentPath,
            dialogVisible,
            currentMedia,
            handleNodeClick,
            viewMedia,
            isImage,
            getFileType
          };
        }
      })
        .use(ElementPlus)
        .mount("#app");
    </script>
  </body>
</html>
