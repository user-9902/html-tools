<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>媒体查看器</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/element-plus/dist/index.css"
    />
    <script src="https://unpkg.com/vue@3"></script>
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <style>
      /* var */
      :root {
        --color-gary-0: #fff;
        --color-gary-1: #f7f7f7;
        --color-gary-2: #e3e5e7;
        --color-gary-3: #c9ccd0;

        --color-gary-9: #2f3238;
        --color-gary-10: #18191c;
        --color-gray-99: #000;
      }

      body[theme="theme-dark"] {
        --bg-color: var(--color-gary-9);
        --aside-color: var(--color-gary-10);
        --font-color: var(--color-gary-1);
        --hover-color: var(--color-gary-99);
        --active-color: var(--color-gary-9);
      }

      body[theme="theme-light"] {
        --bg-color: var(--color-gary-1);
        --aside-color: var(--color-gary-2);
        --font-color: var(--color-gary-99);
        --hover-color: var(--color-gary-3);
      }

      /* 样式 */
      body {
        margin: 0;
        color: var(--font-color);
      }

      h2 {
        font-size: 16px;
        margin: 0;
        margin-bottom: 4px;
      }

      #app {
        background-color: var(--bg-color);
      }

      .container {
        & > * {
          padding: 12px;
          height: 100vh;
        }
      }

      .menus {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        .menus1 {
          padding: 8px;
          background-color: var(--aside-color);
          border-radius: 8px;
          height: calc(50% - 24px);
        }
        .menus2 {
          padding: 8px;
          border-radius: 8px;
          background-color: var(--aside-color);
          height: calc(50% - 24px);
        }
      }
      .main-content {
        padding: 8px;
        border-radius: 8px;
        background-color: var(--aside-color);
        height: calc(100% - 16px);
        overflow-y: scroll;
        .media-box {
          display: flex;
          flex-direction: column;
          align-items: center;
        }
        /* 第一个是自定义光标的URL，之后是可选的默认光标类型 */
        cursor: url("https://pic.616pic.com/ys_bnew_img/00/03/99/EKtSyM1ed8.jpg")
            20 20,
          url("https://pic.616pic.com/ys_bnew_img/00/03/99/EKtSyM1ed8.jpg"),
          auto;
      }
      .video {
        margin: auto;
        width: 100%;
        height: calc(100% - 16px);
      }

      .setting {
        height: calc(100% - 16px);
        background-color: var(--aside-color);
      }
      .el-tree {
        background-color: transparent;
        color: var(--font-color);
      }
      .el-tree-node__content:hover {
        background-color: var(--hover-color);
      }

      /* reset */
    </style>
  </head>

  <body theme="theme-dark">
    <div id="app">
      <el-container class="container">
        <el-aside class="menus" style="width: 300px">
          <div class="menus1">
            <h2>
              <el-icon style="top: 2px; margin-right: 4px"> <folder /> </el-icon
              >文件夹目录
            </h2>
            <el-tree
              :data="menuTree"
              style="height: calc(100% - 24px); overflow-y: scroll"
            >
              <template #default="{ node, data }">
                <el-tooltip
                  class="box-item"
                  effect="dark"
                  :content="node.label"
                  placement="right-start"
                >
                  <p style="flex: 2" @click="currentFloder = node.data">
                    {{ node.label }}
                  </p>
                </el-tooltip>
              </template>
            </el-tree>
          </div>

          <div class="menus2">
            <h2>
              <el-icon style="top: 2px; margin-right: 4px"><memo /></el-icon
              >文件目录
            </h2>
            <el-col style="height: calc(100% - 24px); overflow-y: scroll">
              <el-row
                style="cursor: pointer; padding-left: 8px"
                v-for="file,idx in subMenu"
                @click="()=>onClickSubMenu(idx)"
                v-show="file.fileType === settingForm.curMod"
                :key="idx"
              >
                {{file.label.replace(/.+\//g, "")}}
              </el-row>
            </el-col>
          </div>
        </el-aside>

        <!-- content -->
        <el-main style="position: relative">
          <div class="main-content">
            <template v-if="settingForm.curMod === 'video'">
              <video
                id="my-video"
                class="video"
                controls
                preload="auto"
                data-setup="{}"
                v-if="subMenu?.[index]?.label"
              >
                <source :src="subMenu[index].label" type="video/mp4" />
              </video>
            </template>

            <template
              v-if="settingForm.curMod === 'image' && settingForm.picReadMod === '0'"
            >
              <div
                :id="`content-${idx}`"
                class="media-box"
                v-for="(child, idx) in currentFloder.files"
                :key="idx"
              >
                <el-image
                  style="width: 100%"
                  v-if="child.fileType === 'image'"
                  :src="child.label"
                ></el-image>
              </div>
            </template>

            <template
              v-if="settingForm.curMod === 'image' && settingForm.picReadMod === '1'"
            >
              <div
                :id="`content-${index}`"
                class="media-box"
                @click="onPageTurn"
              >
                <el-image
                  v-if="subMenu?.[index]?.label"
                  style="width: 100%"
                  :src="subMenu[index].label"
                ></el-image>
              </div>
            </template>
          </div>
        </el-main>

        <el-aside class="setting" style="width: 280px">
          <el-form>
            <el-form-item label="当前模式">
              <el-radio-group
                v-model="settingForm.curMod"
                aria-label="label position"
              >
                <el-radio-button value="image">看图</el-radio-button>
                <el-radio-button value="video">看视频</el-radio-button>
              </el-radio-group>
            </el-form-item>

            <el-form-item label="翻看模式">
              <el-select
                v-model="settingForm.picReadMod"
                placeholder="Select"
                style="width: 240px"
              >
                <el-option :key="0" label="上下滑动" value="0"></el-option>
                <el-option :key="1" label="左右翻看" value="1"></el-option>
              </el-select>
            </el-form-item>

            <el-form-item label="图片大小">
              <el-select
                v-model="settingForm.picLayoutMod"
                placeholder="Select"
                style="width: 240px"
              >
                <el-option :key="0" label="宽度撑满" value="0"></el-option>
                <el-option :key="0" label="高度撑满" value="1"></el-option>
                <el-option :key="0" label="原始比例" value="1"></el-option>
              </el-select>

              <el-slider v-model="value1" />
            </el-form-item>
          </el-form>
        </el-aside>
      </el-container>
    </div>

    <script>
      const { createApp, ref, onMounted, computed, watch } = Vue;
      const { Folder, Memo } = ElementPlusIconsVue;

      const menus = `{{ template }}`;

      function createNode(label, type) {
        return {
          label,
          type,
          fileType: "",
          children: [],
          files: [],
          parent: null
        };
      }

      function dfs(node) {
        // 处理当前节点
        const res = createNode(node.name, "folder");
        // 处理 children
        for (let i = 0; i < node.children.length; i++) {
          const element = node.children[i];
          const child = dfs(element);
          child.parent = res; // 设置父节点
          res.children.push(child);
        }
        // 处理 files
        for (let i = 0; i < node.files.length; i++) {
          const element = node.files[i];
          const child = createNode(element, "file");
          child.parent = res; // 设置父节点F
          child.fileType = getFileType(child);
          res.files.push(child);
        }
        return res;
      }

      function getFileType(child) {
        const postfix = child.label.replace(/.+\./, "");
        if (["jpg", "jpeg", "png", "webp"].includes(postfix)) {
          return "image";
        }
        if (["mp4", "webm"].includes(postfix)) {
          return "video";
        }
        return "unknow";
      }

      createApp({
        setup() {
          const menuTree = ref(dfs(JSON.parse(menus)).children);

          const settingForm = ref({
            curMod: "video",
            picLayoutMod: "0",
            picReadMod: "1"
          });

          const currentFloder = ref({});

          const subMenu = computed(() => {
            onClickSubMenu(0);
            console.log(
              currentFloder.value?.files?.filter(
                (i) => i.fileType === settingForm.value.curMod
              ) || []
            );

            return (
              currentFloder.value?.files?.filter(
                (i) => i.fileType === settingForm.value.curMod
              ) || []
            );
          });

          const index = ref(0);
          watch(index, () => {
            if (settingForm.value.curMod === "video") {
              const videoElement = document.getElementById("my-video");
              videoElement?.load();
              videoElement?.focus();
            }
          });
          function onClickSubMenu(idx) {
            if (settingForm.value.picReadMod === "0") {
              const el = document.getElementById(`content-${idx}`);
              el.scrollIntoView({
                block: "start"
              });
            }
            if (settingForm.value.picReadMod === "1") {
              index.value = idx;
            }
          }

          function go(i) {
            // 判断点击位置是在中轴左侧还是右侧
            if (i < 0 || i >= currentFloder.value.files.length) return;
            index.value = i;
          }

          function onPageTurn(e) {
            // 获取被点击元素的位置和尺寸
            const rect = e.currentTarget.getBoundingClientRect();
            // 计算元素的中轴位置
            const centerX = rect.left + rect.width / 2;
            // 获取点击事件的x坐标
            const clickX = e.clientX;

            const i = index.value + (clickX < centerX ? -1 : 1);
            go(i);
          }

          return {
            onClickSubMenu,
            subMenu,
            menuTree,
            currentFloder,
            settingForm,
            index,
            onPageTurn
          };
        }
      })
        .use(ElementPlus)
        .component("Folder", Folder)
        .component("Memo", Memo)
        .mount("#app");
    </script>
  </body>
</html>
